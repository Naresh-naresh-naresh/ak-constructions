version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        # Use Node (not shell echo) so values containing $ are not mangled.
        - |
          node -e "
          const fs = require('fs');
          const keys = [
            'NEXTAUTH_SECRET', 'NEXTAUTH_URL', 'ADMIN_USERNAME',
            'ADMIN_PASSWORD_HASH', 'ADMIN_PASSWORD_HASH_B64',
            'PROJECTS_TABLE_NAME', 'DYNAMODB_REGION',
            'DYNAMODB_ACCESS_KEY_ID', 'DYNAMODB_SECRET_ACCESS_KEY'
          ];
          const lines = keys.filter((k) => process.env[k]).map((k) => k + '=' + process.env[k]);
          if (lines.length) fs.appendFileSync('.env.production', lines.join('\n') + '\n');
          "
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - .next/cache/**/*
      - node_modules/**/*
