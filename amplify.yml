version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        # Amplify Secrets are runtime-only; Next.js inlines server env vars at
        # build time. Use Node (not shell echo) so bcrypt hashes containing $
        # are not mangled by the shell during .env.production generation.
        - |
          node -e "
          const fs = require('fs');
          const keys = [
            'NEXTAUTH_SECRET', 'NEXTAUTH_URL', 'ADMIN_USERNAME', 'ADMIN_PASSWORD_HASH',
            'PROJECTS_TABLE_NAME', 'DYNAMODB_REGION', 'DYNAMODB_ACCESS_KEY_ID', 'DYNAMODB_SECRET_ACCESS_KEY'
          ];
          const lines = keys.filter((k) => process.env[k]).map((k) => k + '=' + process.env[k]);
          if (lines.length) fs.appendFileSync('.env.production', lines.join('\n') + '\n');
          "
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - .next/cache/**/*
      - node_modules/**/*
