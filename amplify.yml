version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        # Amplify Secrets are runtime-only; Next.js inlines server env vars at
        # build time. Write them into .env.production so NextAuth sees
        # NEXTAUTH_SECRET during `next build`, not just in the SSR Lambda.
        - echo "NEXTAUTH_SECRET=$NEXTAUTH_SECRET" >> .env.production
        - echo "NEXTAUTH_URL=$NEXTAUTH_URL" >> .env.production
        - echo "ADMIN_USERNAME=$ADMIN_USERNAME" >> .env.production
        - echo "ADMIN_PASSWORD_HASH=$ADMIN_PASSWORD_HASH" >> .env.production
        - echo "PROJECTS_TABLE_NAME=$PROJECTS_TABLE_NAME" >> .env.production
        - echo "DYNAMODB_REGION=$DYNAMODB_REGION" >> .env.production
        - echo "DYNAMODB_ACCESS_KEY_ID=$DYNAMODB_ACCESS_KEY_ID" >> .env.production
        - echo "DYNAMODB_SECRET_ACCESS_KEY=$DYNAMODB_SECRET_ACCESS_KEY" >> .env.production
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - .next/cache/**/*
      - node_modules/**/*
